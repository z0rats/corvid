name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install system build dependencies (lxml compiles from source on cp314)
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libxml2-dev libxslt-dev liblzma-dev zlib1g-dev

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: backend/requirements.txt

      - name: Install dependencies
        run: uv pip install --system -r requirements.txt --override lxml-override.txt

      - name: Run tests
        run: pytest -v

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Enable Corepack
        run: corepack enable

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: yarn
          cache-dependency-path: frontend/yarn.lock

      - name: Install dependencies
        run: yarn install --immutable

      - name: Build (lints via CRA's eslint-webpack-plugin, CI=true fails on warnings)
        run: yarn build

      - name: Test
        run: yarn test --watchAll=false

  docker-build:
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v4

      - name: Build images
        run: docker compose -f docker-compose.yaml build

      - name: Smoke test backend
        run: |
          docker compose -f docker-compose.yaml up -d backend
          for i in $(seq 1 15); do
            if docker compose -f docker-compose.yaml exec -T backend python -c "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/healthcheck')" 2>/dev/null; then
              echo "Backend healthy"
              exit 0
            fi
            sleep 2
          done
          echo "Backend did not become healthy in time"
          docker compose -f docker-compose.yaml logs backend
          exit 1

      - name: Tear down
        if: always()
        run: docker compose -f docker-compose.yaml down
