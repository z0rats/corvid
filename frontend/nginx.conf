server {
    listen 80;
    server_name localhost;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types text/plain text/css text/xml application/json application/javascript application/xml application/xml+rss image/svg+xml;

    # API requests - proxy to backend
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # nginx's default (60s) is shorter than several long-running scan features
        # (git_recon/username_search/email_search - SSE streams with long gaps
        # between events while a scan runs server-side, up to
        # social_analyzer_config.py's 1800s PROCESS_WATCHDOG_SECONDS). Without this,
        # nginx 504s the client mid-scan while the backend keeps running and
        # persists its result anyway - the scan "fails" in the UI but shows up
        # complete in history moments later.
        proxy_read_timeout 1900s;
        proxy_send_timeout 1900s;
    }

    # Documentation requests - proxy to backend
    location /docs {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /openapi.json {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # CRA fingerprints these filenames with a content hash, so a given URL's
    # content never changes - safe to let browsers/proxies cache indefinitely.
    location /static/ {
        root /usr/share/nginx/html;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        add_header X-Content-Type-Options "nosniff" always;
    }

    # Frontend static files
    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;

        # index.html references the current hashed bundle, so it must always
        # be revalidated - caching it would pin clients to a stale build.
        add_header Cache-Control "no-cache" always;

        # The backend's SecurityHeadersMiddleware only covers its own
        # responses (/api/, /docs, /openapi.json) - this is what the browser
        # actually gets for the SPA itself, so it needs its own copy.
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header X-Permitted-Cross-Domain-Policies "none" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self'; object-src 'none'; frame-ancestors 'none'; base-uri 'self'" always;
    }
}